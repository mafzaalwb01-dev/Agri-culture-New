<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Agri Force</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body style="background:var(--charcoal);min-height:100vh;display:flex;align-items:center;justify-content:center">

  <div class="auth-container" style="margin:0">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:3rem;margin-bottom:8px">🔐</div>
      <h2 style="font-family:'Outfit';font-size:1.5rem;color:#fff">Admin Portal</h2>
      <p style="color:#9CA3AF;font-size:.9rem">Agri Force Management</p>
    </div>
    <div class="auth-card">
      <form id="adminLoginForm">
        <div class="form-group"><label>Username</label><input type="text" id="adminUser" placeholder="admin" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="adminPass" placeholder="Enter password" required></div>
        <button type="submit" class="btn-primary">🔓 Access Dashboard</button>
      </form>
    </div>
    <div style="text-align:center;margin-top:16px">
      <a href="../index.html" style="color:#9CA3AF;font-size:.85rem">← Back to Store</a>
    </div>
  </div>

  <script>
    document.getElementById('adminLoginForm').onsubmit = (e) => {
      e.preventDefault();
      const user = document.getElementById('adminUser').value;
      const pass = document.getElementById('adminPass').value;
      if (user === 'afi' && pass === 'afiw3') {
        sessionStorage.setItem('gh_admin', 'true');
        window.location.href = 'dashboard.html';
      } else {
        alert('Invalid credentials!');
      }
    };
    if (sessionStorage.getItem('gh_admin') === 'true') window.location.href = 'dashboard.html';
  </script>
</body>
</html>
