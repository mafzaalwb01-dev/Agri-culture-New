<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Agri Force</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">🌿 <span>Agri Force</span></a>
      <div class="header-actions">
        <a href="cart.html"><button aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-badge hidden">0</span></button></a>
      </div>
    </div>
  </header>

  <div class="auth-container">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:3rem;margin-bottom:8px">🌿</div>
      <h2 style="font-family:'Outfit';font-size:1.5rem">Welcome Back</h2>
      <p style="color:var(--text-light);font-size:.9rem">Fresh produce, one tap away</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password" required></div>
        <button type="submit" class="btn-primary">Login →</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" style="display:none">
        <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Your name" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@email.com" required></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+91 9876543210" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Create password" required></div>
        <button type="submit" class="btn-primary">Create Account →</button>
      </form>
    </div>

    <!-- Logged In State -->
    <div id="loggedInState" style="display:none">
      <div class="auth-card" style="text-align:center">
        <div style="font-size:3rem;margin-bottom:12px">👋</div>
        <h3 id="userName" style="margin-bottom:4px"></h3>
        <p id="userEmail" style="color:var(--text-light);font-size:.85rem;margin-bottom:20px"></p>
        <a href="index.html"><button class="btn-primary" style="margin-bottom:10px">Continue Shopping</button></a>
        <button onclick="Auth.logout();location.reload()" style="width:100%;padding:12px;background:var(--bg);border-radius:12px;font-weight:600;color:var(--red)">Logout</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home</a>
    <a href="index.html#categoryBar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explore</a>
    <a href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Cart</a>
    <a href="login.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Account</a>
  </nav>

  <script src="js/products-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
      document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
      document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
    }
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getUser();
      if (user) {
        document.querySelector('.auth-card').style.display = 'none';
        document.querySelector('.auth-container > div:first-child').style.display = 'none';
        const ls = document.getElementById('loggedInState');
        ls.style.display = 'block';
        document.getElementById('userName').textContent = 'Hello, ' + user.name + '!';
        document.getElementById('userEmail').textContent = user.email;
      }
      document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        Auth.login(email, email.split('@')[0]);
        showToast('Welcome back! 🎉');
        setTimeout(() => location.reload(), 1000);
      };
      document.getElementById('registerForm').onsubmit = (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        Auth.login(email, name);
        showToast('Account created! 🎉');
        setTimeout(() => location.reload(), 1000);
      };
    });
  </script>
</body>
</html>
