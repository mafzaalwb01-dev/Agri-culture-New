<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Agri Force</title>
  <meta name="description" content="View product details and add to cart — Agri Force organic produce.">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">🌿 <span>Agri Force</span></a>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="text" placeholder="Search fresh produce...">
      </div>
      <div class="header-actions">
        <a href="cart.html"><button aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg><span class="cart-badge hidden">0</span></button></a>
      </div>
    </div>
  </header>

  <div class="product-detail" id="productDetail"></div>

  <!-- Related Products -->
  <div style="max-width:900px;margin:0 auto;padding:0 16px 120px">
    <h2 style="font-size:1.2rem;margin-bottom:16px">You might also like</h2>
    <div class="product-grid" id="relatedGrid" style="padding:0"></div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9,22 9,12 15,12 15,22" />
      </svg>Home</a>
    <a href="index.html#categoryBar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>Explore</a>
    <a href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>Cart</a>
    <a href="login.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>Account</a>
  </nav>

  <script src="js/products-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));
      const p = PRODUCTS.find(x => x.id === id);
      if (p) {
        document.title = p.name + ' — Agri Force';
        const related = PRODUCTS.filter(x => x.category === p.category && x.id !== p.id).slice(0, 4);
        renderProducts(document.getElementById('relatedGrid'), related);
      }
    });
  </script>
</body>

</html>
