<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Agri Force</title>
  <meta name="description" content="Get in touch with Agri Force. Visit our farm, call us, or message us on WhatsApp.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">🌿 <span>Agri Force</span></a>
      <div class="header-actions">
        <a href="cart.html"><button aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="cart-badge hidden">0</span></button></a>
      </div>
    </div>
  </header>

  <div style="max-width:1000px;margin:0 auto;padding:24px 16px">
    <h1 style="font-family:'Outfit';font-size:1.8rem;margin-bottom:8px">📍 Get in Touch</h1>
    <p style="color:var(--text-light);margin-bottom:24px">We'd love to hear from you! Visit our farm or reach out online.</p>
  </div>

  <div class="contact-grid">
    <!-- Map -->
    <div class="contact-card">
      <h3>🗺️ Our Farm Location</h3>
      <div class="map-wrap">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3323.003975543719!2d71.43615711520625!3d34.01513688061614!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38d910d5402919ab%3A0x367fdf51a70c0c!2sKhyber%20Pakhtunkhwa%2C%20Pakistan!5e0!3m2!1sen!2s!4v1684300000000!5m2!1sen!2s" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="contact-card">
      <h3>📞 Contact Information</h3>
      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:12px">
          <span style="font-size:1.5rem">📞</span>
          <div><div style="font-weight:600;font-size:.85rem">Phone</div><div style="color:var(--text-light);font-size:.85rem">+91-9876543210</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:12px">
          <span style="font-size:1.5rem">📧</span>
          <div><div style="font-weight:600;font-size:.85rem">Email</div><div style="color:var(--text-light);font-size:.85rem">mafzaal52302@gmail.com</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:12px">
          <span style="font-size:1.5rem">🕐</span>
          <div><div style="font-weight:600;font-size:.85rem">Business Hours</div><div style="color:var(--text-light);font-size:.85rem">Mon–Sat: 6AM – 8PM</div></div>
        </div>
      </div>
      <a href="https://wa.me/919876543210?text=Hi%20Agri%20Force!%20I'd%20like%20to%20order%20some%20fresh%20produce." target="_blank" class="whatsapp-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.553 4.12 1.52 5.857L.057 23.764l6.071-1.592A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.82c-1.978 0-3.81-.534-5.394-1.46l-.386-.229-4.005 1.05 1.07-3.908-.252-.399A9.787 9.787 0 012.18 12c0-5.422 4.398-9.82 9.82-9.82 5.422 0 9.82 4.398 9.82 9.82 0 5.422-4.398 9.82-9.82 9.82z"/></svg>
        Chat on WhatsApp
      </a>
    </div>

    <!-- Contact Form -->
    <div class="contact-card" style="grid-column:1/-1">
      <h3>✉️ Send us a Message</h3>
      <form id="contactForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group"><label>Your Name</label><input type="text" placeholder="Full name" required></div>
          <div class="form-group"><label>Email</label><input type="email" placeholder="you@email.com" required></div>
        </div>
        <div class="form-group"><label>Subject</label><input type="text" placeholder="How can we help?"></div>
        <div class="form-group"><label>Message</label><textarea rows="4" placeholder="Tell us what you need..." required></textarea></div>
        <button type="submit" class="btn-primary">Send Message →</button>
      </form>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home</a>
    <a href="index.html#categoryBar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explore</a>
    <a href="cart.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Cart</a>
    <a href="login.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Account</a>
  </nav>

  <script src="js/products-data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('contactForm').onsubmit = (e) => {
      e.preventDefault();
      showToast('Message sent! We\'ll reply soon 📩');
      e.target.reset();
    };
  </script>
</body>
</html>
